        - generic [ref=e62]: Em um mundo onde demônios se alimentam de humanos desavisados, fragmentos do lendário e temido demônio Ryoumen Sukuna foram perdidos e espalhados. Se algum demônio consumir partes do corpo de Sukuna, o poder que eles ganham pode destruir o mundo como o conhecemos. Felizmente, existe uma misteriosa escola de feiticeiros Jujutsu que existem para proteger a precária existência dos vivos! Yuuji Itadori é um estudante do ensino médio que passa seus dias visitando seu avô acamado. Embora ele se pareça com um adolescente comum, sua imensa força física é algo notável! Todos os clubes de esportes querem que ele entre, mas Itadori prefere sair com os párias da escola do Clube de Ocultismo. Um dia, o clube consegue colocar as mãos em um objeto maldito lacrado, mas mal sabem eles o terror que vão desencadear quando quebrarem o selo.
