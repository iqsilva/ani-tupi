name: Publish TestPyPI

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: Build and publish to TestPyPI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: latest
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Build package
        run: uv build

      - name: Publish to TestPyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.TESTPYPI_API_TOKEN }}
        run: |
          set -euo pipefail
          uv publish \
            --publish-url https://test.pypi.org/legacy/ \
            --check-url https://test.pypi.org/simple/

      - name: Smoke test install from TestPyPI
        run: |
          set -euo pipefail
          VERSION="$(grep '^version = ' pyproject.toml | head -1 | sed 's/version = "\(.*\)"/\1/')"
          for attempt in $(seq 1 12); do
            if uv tool install \
              --force \
              --python 3.12 \
              --index https://test.pypi.org/simple/ \
              --extra-index-url https://pypi.org/simple/ \
              "ani-tupi==${VERSION}"; then
              break
            fi
            if [[ "${attempt}" -eq 12 ]]; then
              echo "Package not visible on TestPyPI index after waiting"
              exit 1
            fi
            echo "Waiting for TestPyPI index propagation (attempt ${attempt}/12)..."
            sleep 10
          done
          timeout 30 ani-tupi --help
          test -x "$(command -v manga-tupi)"
