name: Build Test

on:
  push:
    branches: [main, master]
    paths:
      - '**.py'
      - 'pyproject.toml'
      - 'install-cli.py'
      - '.github/workflows/build-test.yml'
  pull_request:
    paths:
      - '**.py'
      - 'pyproject.toml'
      - 'install-cli.py'
      - '.github/workflows/build-test.yml'
  workflow_dispatch:

jobs:
  test-install-cli:
    name: Test install-cli.py - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12"]

    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Configurar Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache uv
      uses: actions/cache@v4
      with:
        path: |
          ~/.local/bin/uv
          ~/.cache/uv
        key: ${{ runner.os }}-uv-${{ hashFiles('pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-uv-

    - name: Instalar UV
      run: pip install uv

    - name: Executar install-cli.py
      run: python3 install-cli.py

    - name: Verificar CLI instalado (Linux/macOS)
      if: runner.os != 'Windows'
      run: |
        which ani-tupi
        ani-tupi --help

    - name: Verificar CLI instalado (Windows)
      if: runner.os == 'Windows'
      shell: powershell
      run: |
        Get-Command ani-tupi
        ani-tupi --help
