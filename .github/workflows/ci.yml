name: CI

on:
  push:
    branches: [main, master, develop]
    paths-ignore: ['**.md', 'docs/**', '.gitignore', 'LICENSE', '.env*']
  pull_request:
    paths-ignore: ['**.md', 'docs/**', '.gitignore', 'LICENSE', '.env*']

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Cache uv
      uses: actions/cache@v4
      with:
        path: |
          ~/.local/bin/uv
          ~/.cache/uv
        key: ${{ runner.os }}-uv-${{ hashFiles('pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-uv-

    - name: Instalar UV
      run: pip install uv

    - name: Verificar pyproject.toml
      run: uv --version

    - name: Validar dependências
      run: uv sync --no-install-project

    - name: Verificar sintaxe Python
      run: |
        uv run python -m py_compile main.py
        uv run python -m py_compile manga_tupi.py

    - name: Verificar plugins
      run: |
        for plugin in scrapers/plugins/*.py; do
          if [ -f "$plugin" ]; then
            uv run python -m py_compile "$plugin"
          fi
        done

    - name: Run ruff
      run: uv run ruff check .

    - name: Run ruff format check
      run: uv run ruff format --check .

    - name: Run tests
      run: uv run pytest -v --cov=. --cov-report=xml --cov-report=term-missing

    - name: Upload coverage
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        fail_ci_if_error: false

  quick-imports:
    name: Test Imports (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: lint-and-test
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
      fail-fast: false

    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Cache uv
      uses: actions/cache@v4
      with:
        path: |
          ~/.local/bin/uv
          ~/.cache/uv
        key: ${{ runner.os }}-uv-${{ hashFiles('pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-uv-

    - name: Instalar UV
      run: pip install uv

    - name: Instalar dependências
      run: uv sync

    - name: Testar imports
      run: |
        uv run python -c "from scrapers import loader"
        uv run python -c "from services import repository"
        uv run python -c "from utils import video_player"
        uv run python -c "import manga_tupi"
        uv run python -c "from main import cli"

    - name: Testar CLI help
      run: |
        uv run python main.py --help
