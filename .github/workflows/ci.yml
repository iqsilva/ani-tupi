name: CI

on:
  push:
    branches: [main, master, develop]
    paths-ignore: ['**.md', 'docs/**', '.gitignore', 'LICENSE', '.env*']
  pull_request:
    paths-ignore: ['**.md', 'docs/**', '.gitignore', 'LICENSE', '.env*']

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Cache uv
      uses: actions/cache@v4
      with:
        path: |
          ~/.local/bin/uv
          ~/.cache/uv
        key: ${{ runner.os }}-uv-${{ hashFiles('pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-uv-

    - name: Instalar UV
      run: pip install uv

    - name: Verificar pyproject.toml
      run: uv --version

    - name: Validar dependências
      run: uv sync --no-install-project

    - name: Verificar sintaxe Python
      run: |
        uv run python -m py_compile main.py
        uv run python -m py_compile manga_tupi.py

    - name: Verificar plugins
      run: |
        for plugin in scrapers/plugins/*.py; do
          if [ -f "$plugin" ]; then
            uv run python -m py_compile "$plugin"
          fi
        done

    - name: Run ruff
      run: uv run ruff check .

    - name: Run ruff format check
      run: uv run ruff format --check .

    - name: Run tests
      run: uv run pytest -v --cov=. --cov-report=xml --cov-report=term-missing --ignore=tests/integration/test_scrapers_real_http.py

    - name: Upload coverage
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        fail_ci_if_error: false

  quick-imports:
    name: Test Imports (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: lint-and-test
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
      fail-fast: false

    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Cache uv
      uses: actions/cache@v4
      with:
        path: |
          ~/.local/bin/uv
          ~/.cache/uv
        key: ${{ runner.os }}-uv-${{ hashFiles('pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-uv-

    - name: Instalar UV
      run: pip install uv

    - name: Instalar dependências
      run: uv sync

    - name: Testar imports
      run: |
        uv run python -c "from scrapers import loader"
        uv run python -c "from services import repository"
        uv run python -c "from utils import video_player"
        uv run python -c "import manga_tupi"
        uv run python -c "from main import cli"

    - name: Testar CLI help
      run: |
        uv run python main.py --help

  package-build:
    name: Package Build Smoke Test
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Instalar UV
      run: pip install uv

    - name: Build sdist and wheel
      run: uv build

    - name: Smoke test wheel install
      run: |
        set -euo pipefail
        python -m venv /tmp/pkg-test-venv
        /tmp/pkg-test-venv/bin/pip install --quiet dist/*.whl
        test -x /tmp/pkg-test-venv/bin/manga-tupi
        timeout 30 /tmp/pkg-test-venv/bin/ani-tupi --help
        /tmp/pkg-test-venv/bin/python -c "import manga_tupi; import main"

  smoke-test:
    name: Smoke Test (ani-tupi -q naruto)
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Instalar UV
      run: pip install uv

    - name: Instalar dependências
      run: uv sync

    - name: Smoke test - buscar naruto
      run: |
        # Send empty input so interactive menu exits; capture output including stderr
        echo "" | timeout 60 uv run ani-tupi -q "naruto" 2>&1 | tee /tmp/smoke_output.txt || true
        # Fail if installation/import errors are detected
        if grep -iE "(ImportError|ModuleNotFoundError|No module named)" /tmp/smoke_output.txt; then
          echo "❌ Installation error detected in output"
          cat /tmp/smoke_output.txt
          exit 1
        fi
        echo "✅ Smoke test passed"
